h1{color:#fff;margin-bottom:6px;font-size:1.4rem}

.preset-section{background:#1a1f2e;border:1px solid #2d3748;border-radius:10px;padding:16px;margin:12px 0}
table.cost-table{width:100%;border-collapse:collapse;font-size:.78rem;margin:8px 0}
table.cost-table th{text-align:left;padding:6px 8px;background:#151a27;color:#a0aec0;border-bottom:1px solid #2d3748}
table.cost-table td{padding:5px 8px;border-bottom:1px solid #1a2030}
table.cost-table tr:hover td{background:#1e2535}
.run-time{color:#4a5568;font-size:.72rem;margin-top:4px}

// ==================== AUTO-QTY LOGIC (copied from estimator) ====================
function getAutoQty(item, sf, bed, bath, stories) {
  stories = Math.max(1, stories);
  const roofSF = Math.round(sf * 1.15 / stories);
  const ceilingHeight = 8;
  const floorSF = sf / stories;
  const perim = 4 * Math.sqrt(floorSF);
  const wallSF = Math.round(perim * ceilingHeight * stories * 0.85);
  const ceilingSF = sf;
  const paintableSF = wallSF + ceilingSF;
  const wallOnlySF = wallSF;

  const cat = item.category;
  const name = item.line_item.toLowerCase();
  const unit = item.unit.toLowerCase();

  if (cat === 'Roofing' && unit.includes('sf')) return roofSF;
  if (cat === 'Interior Paint' && unit.includes('sf')) {
    if (name.includes('ceiling') || name.includes('trim')) return paintableSF;
    return wallOnlySF;
  }
  if (cat === 'Drywall & Interior Walls' && unit.includes('sf')) {
    if (name.includes('popcorn') || name.includes('texture') || name.includes('ceiling')) return ceilingSF;
    return paintableSF;
  }
  if (cat === 'Flooring' && unit.includes('sf')) return sf;
  if (cat === 'Flooring' && unit.includes('bath')) return bath;
  if (name.includes('interior door')) return bed * 2 + bath + 2;
  if (cat === 'Bathroom' && unit === 'each') return bath;
  if (name.includes('toilet')) return bath;
  if (unit.includes('sf') && (name.includes('rewire') || name.includes('re-pipe') || name.includes('ductwork'))) return sf;
  if (name.includes('general demolition') && unit.includes('sf')) return sf;
  if (name.includes('subfloor') && unit.includes('sf')) return sf;
  if (cat === 'Insulation' && unit.includes('sf')) return Math.round(sf / stories);
  if (cat === 'Exterior' && unit.includes('sf') && (name.includes('paint') || name.includes('siding'))) return wallOnlySF;
  if (cat === 'Landscaping & Exterior Cleanup' && unit.includes('sf')) return sf;
  if (unit === 'each' || unit === 'lump sum') return 1;
  return 0;
}

function getPresetQty(name, unit, cat, sf, bed, bath, stories) {
  stories = Math.max(1, stories);
  const rooms = bed + bath + 2;
  const n = name.toLowerCase();

  if (n.includes('light fixture')) return rooms;
  if (n.includes('recessed lighting')) return rooms * 2;
  if (n.includes('ceiling fan')) return bed;
  if (n.includes('smoke') || n.includes('co detector')) return Math.max(rooms, 1);
  if (n.includes('gfci')) return bath + 1;
  if (n.includes('faucet')) return bath + 1;
  if (n.includes('toilet')) return bath;
  if (n.includes('garbage disposal')) return 1;
  if (n.includes('exhaust fan')) return bath;
  if (n.includes('vanity') && n.includes('single')) return bath;
  if (n.includes('vanity') && n.includes('double')) return Math.max(1, Math.floor(bath / 2));
  if (n.includes('bathroom mirror')) return bath;
  if (n.includes('interior door') && n.includes('hollow')) return bed * 2 + bath + 2;
  if (n.includes('interior door') && n.includes('solid')) return bed * 2 + bath + 2;
  if (n.includes('window') && unit === 'each') return Math.round(rooms * 1.5);
  if (n.includes('cabinet painting')) return Math.round(sf * 0.015);
  if (n.includes('bathroom floor')) return bath;
  if (n.includes('tile') && n.includes('bathroom')) return bath;
  if (n.includes('tub') || n.includes('shower')) return bath;
  if (n.includes('full bathroom remodel')) return bath;
  if (n.includes('sink') && cat === 'Kitchen') return 1;
  if (n.includes('range hood')) return 1;
  if (n.includes('appliance package')) return 1;
  if (n.includes('thermostat')) return stories;
  if (n.includes('water heater')) return 1;
  if (n.includes('entry door')) return 1;
  if (n.includes('garage door opener')) return 1;
  if (n.includes('garage door') && n.includes('single')) return 1;
  if (n.includes('garage door') && n.includes('double')) return 1;
  if (n.includes('dumpster')) return 2;
  if (n.includes('panel upgrade')) return 1;
  if (n.includes('furnace') || n.includes('a/c condenser') || n.includes('full hvac')) return 1;
  if (n.includes('mini-split')) return 1;
  if (n.includes('tree removal')) return 2;
  if (n.includes('appraisal')) return 1;
  return null;
}

// ==================== SIMULATION ENGINE ====================
function simulatePreset(level, sf, bed, bath, stories) {
  const presetItems = PRESET_ITEMS[level];
  const result = [];

  COST_DATA.forEach(d => {
    const nameLC = d.line_item.toLowerCase();
    const match = presetItems.find(p => nameLC.includes(p.match.toLowerCase()));
    if (!match) return;

    let t = match.tier;
    if (d[t] === null) {
      if (t === 'high_end') t = d.mid_range !== null ? 'mid_range' : 'contractor';
      else if (t === 'contractor') t = d.mid_range !== null ? 'mid_range' : 'high_end';
      else t = d.contractor !== null ? 'contractor' : 'high_end';
    }
    if (d[t] === null) return;

    const smartQty = getPresetQty(d.line_item, d.unit, d.category, sf, bed, bath, stories);
    const autoQty = getAutoQty(d, sf, bed, bath, stories);
    const qty = smartQty !== null ? smartQty : (autoQty > 0 ? autoQty : 1);
    const cost = d[t];
    const lineTotal = qty * cost;

    result.push({
      line_item: d.line_item,
      category: d.category,
      unit: d.unit,
      tier: t,
      requestedTier: match.tier,
      qty: qty,
      unitCost: cost,
      lineTotal: lineTotal,
      matchPattern: match.match
    });
  });

  return result;
}

// ==================== TEST RUNNER ====================
const checks = [];
let passCount = 0, failCount = 0, warnCount = 0;

function check(category, name, passed, detail, isWarning) {
  const status = passed ? 'PASS' : (isWarning ? 'WARN' : 'FAIL');
  if (passed) passCount++;
  else if (isWarning) warnCount++;
  else failCount++;
  checks.push({ category, name, status, detail: detail || '' });
}

function findMatchedItems(level) {
  const presetItems = PRESET_ITEMS[level];
  const matched = [];
  COST_DATA.forEach(d => {
    const nameLC = d.line_item.toLowerCase();
    const match = presetItems.find(p => nameLC.includes(p.match.toLowerCase()));
    if (match) matched.push(d.line_item);
  });
  return matched;
}

function findItemByMatch(matchStr) {
  return COST_DATA.filter(d => d.line_item.toLowerCase().includes(matchStr.toLowerCase()));
}

    const found = COST_DATA.filter(d => d.line_item.toLowerCase().includes(p.match.toLowerCase()));

    dupes.length === 0,

// ===== CATEGORY 3: Tier Consistency Checks =====
const expectedTiers = {
  cosmetic: 'contractor',
  light: 'contractor',
  medium: 'mid_range',
  heavy: 'mid_range',
  gut: 'high_end'
};

presetLevels.forEach(level => {
  const expected = expectedTiers[level];
  const items = presetResults[level];
  const wrongTier = items.filter(i => i.requestedTier !== expected);
  check('3. Tier Consistency', `${level}: all items request '${expected}' tier`,
    wrongTier.length === 0,
    wrongTier.length > 0 ? `${wrongTier.length} items with wrong tier: ${wrongTier.slice(0,5).map(i => `${i.line_item}(${i.requestedTier})`).join(', ')}` : `All ${items.length} items use ${expected}`);
});

// Tier fallback check
presetLevels.forEach(level => {
  const items = presetResults[level];
  const noFallback = items.filter(i => {
    const d = COST_DATA.find(c => c.line_item === i.line_item);
    return d && d[i.requestedTier] === null && d[i.tier] === null;
  });
  check('3. Tier Consistency', `${level}: fallback tier available when preferred is null`,
    noFallback.length === 0,
    noFallback.length > 0 ? noFallback.map(i => i.line_item).join(', ') : 'All fallbacks valid');
});

// ===== CATEGORY 4: Cost Sanity Checks =====
const costRanges = {
  cosmetic: [10, 20],
  light: [15, 35],
  medium: [50, 85],
  heavy: [100, 150],
  gut: [200, 300]
};

const presetTotals = {};
presetLevels.forEach(level => {
  const items = presetResults[level];
  const subtotal = items.reduce((sum, i) => sum + i.lineTotal, 0);
  const contingency = subtotal * 0.10;
  const grand = subtotal + contingency;
  presetTotals[level] = grand;
  const perSF = grand / SF;
  const [lo, hi] = costRanges[level];
  check('4. Cost Sanity', `${level}: $${lo}-$${hi}/SF range`,
    perSF >= lo && perSF <= hi,
    `$${Math.round(perSF)}/SF = $${Math.round(grand).toLocaleString()} total (subtotal $${Math.round(subtotal).toLocaleString()} + 10% contingency)`);
});

// Each level > previous
for (let i = 1; i < presetLevels.length; i++) {
  const prev = presetLevels[i-1];
  const curr = presetLevels[i];
  check('4. Cost Sanity', `${curr} total > ${prev} total`,
    presetTotals[curr] > presetTotals[prev],
    `${prev}: $${Math.round(presetTotals[prev]).toLocaleString()}, ${curr}: $${Math.round(presetTotals[curr]).toLocaleString()}`);
}

// ===== CATEGORY 5: Edge Case Checks =====

// 5a. Studio: 0 bed, 1 bath, 800 SF
const studioConfig = [800, 0, 1, 1];
let studioError = null;
try {
  presetLevels.forEach(level => {
    const result = simulatePreset(level, ...studioConfig);
    result.forEach(item => {
      if (isNaN(item.qty) || !isFinite(item.qty) || item.qty < 0) {
        throw new Error(`${level}/${item.line_item}: qty=${item.qty}`);
      }
      if (isNaN(item.lineTotal) || !isFinite(item.lineTotal)) {
        throw new Error(`${level}/${item.line_item}: total=${item.lineTotal}`);
      }
    });
  });
} catch(e) { studioError = e.message; }
check('5. Edge Cases', '800 SF studio (0 bed, 1 bath): no division by zero',
  studioError === null,
  studioError || 'All calculations valid');

// 5b. Large house: 4000 SF, 5 bed, 4 bath, 2 story

const largeMedium = simulatePreset('medium', ...largeConfig);

const largeRooms = 5 + 4 + 2; // 11
check('5. Edge Cases', `4000 SF (5/4, 2 story): light fixtures = rooms (${largeRooms})`,
  largeLightFixtures && largeLightFixtures.qty === largeRooms,
  largeLightFixtures ? `Expected ${largeRooms}, got ${largeLightFixtures.qty}` : 'NOT FOUND');

// Roof SF halves with 2 stories

const largeRoof = largeMedium.find(i => i.line_item.toLowerCase().includes('tear-off'));
check('5. Edge Cases', `2-story: roof SF = 4000*1.15/2 = ${largeRoofSF}`,
  largeRoof && largeRoof.qty === largeRoofSF,
  largeRoof ? `Expected ${largeRoofSF}, got ${largeRoof.qty}` : 'NOT FOUND');

// Door count increases with more bedrooms
const largeDoors = largeMedium.find(i => i.line_item.toLowerCase().includes('interior door'));
const largeDoorQty = 5*2 + 4 + 2; // 16
check('5. Edge Cases', `5 bed/4 bath: interior doors = ${largeDoorQty}`,
  largeDoors && largeDoors.qty === largeDoorQty,
  largeDoors ? `Expected ${largeDoorQty}, got ${largeDoors.qty}` : 'NOT FOUND');

// Studio door count

const studioDoors = studioMedium.find(i => i.line_item.toLowerCase().includes('interior door'));
const studioDoorQty = 0*2 + 1 + 2; // 3
check('5. Edge Cases', `Studio (0 bed, 1 bath): interior doors = ${studioDoorQty}`,
  studioDoors && studioDoors.qty === studioDoorQty,
  studioDoors ? `Expected ${studioDoorQty}, got ${studioDoors.qty}` : 'NOT FOUND');

// ==================== RENDER RESULTS ====================
document.getElementById('runDate').textContent = new Date().toLocaleString();

const total = passCount + failCount + warnCount;
const summaryBox = document.getElementById('summaryBox');
const allPass = failCount === 0;
summaryBox.innerHTML = `
  <div class="big ${allPass ? 'pass' : 'fail'}">${passCount}/${total} checks passed</div>
  <div style="margin-top:8px;font-size:.9rem">
    <span class="pass">${passCount} passed</span> &middot;
    <span class="fail">${failCount} failed</span> &middot;
    <span class="warn">${warnCount} warnings</span>
  </div>
  <div style="margin-top:12px">
    <strong>Preset totals (1500 SF, 3/2, 1 story, 10% contingency, no tax, national avg):</strong><br>
    ${presetLevels.map(l => `${l.charAt(0).toUpperCase()+l.slice(1)}: <strong>$${Math.round(presetTotals[l]).toLocaleString()}</strong> ($${Math.round(presetTotals[l]/SF)}/SF)`).join(' &middot; ')}
  </div>
  <div style="margin-top:8px;font-size:.82rem;color:#94a3b8">
    <strong>Item counts:</strong> ${presetLevels.map(l => `${l}: ${presetResults[l].length}`).join(', ')}
  </div>
`;

// Group checks by category
const categories = [...new Set(checks.map(c => c.category))];
const resultsDiv = document.getElementById('results');
let html = '';

categories.forEach(cat => {
  const catChecks = checks.filter(c => c.category === cat);
  const catFails = catChecks.filter(c => c.status === 'FAIL').length;
  const catWarns = catChecks.filter(c => c.status === 'WARN').length;
  html += `<h2>${cat} ${catFails > 0 ? `<span class="fail">(${catFails} failed)</span>` : catWarns > 0 ? `<span class="warn">(${catWarns} warnings)</span>` : '<span class="pass">(all pass)</span>'}</h2>`;
  html += '<div class="preset-section">';
  catChecks.forEach(c => {
    const cls = c.status === 'PASS' ? 'pass-bg' : c.status === 'WARN' ? 'warn-bg' : 'fail-bg';
    const icon = c.status === 'PASS' ? '&#10003;' : c.status === 'WARN' ? '&#9888;' : '&#10007;';
    const colorCls = c.status === 'PASS' ? 'pass' : c.status === 'WARN' ? 'warn' : 'fail';
    html += `<div class="check ${cls}">
      <span class="${colorCls}">${icon}</span> ${c.name}
      ${c.detail ? `<div class="detail">${c.detail}</div>` : ''}
    </div>`;
  });
  html += '</div>';
});

// Add detailed preset item tables
html += '<h2>Appendix: Preset Item Detail</h2>';
presetLevels.forEach(level => {
  const items = presetResults[level];
  const total = items.reduce((s, i) => s + i.lineTotal, 0);
  html += `<h3>${level.charAt(0).toUpperCase()+level.slice(1)} (${items.length} items, subtotal $${Math.round(total).toLocaleString()})</h3>`;
  html += `<table class="cost-table"><thead><tr><th>Line Item</th><th>Category</th><th>Tier</th><th>Qty</th><th>Unit Cost</th><th>Line Total</th></tr></thead><tbody>`;
  items.forEach(i => {
    html += `<tr>
      <td>${i.line_item}</td>
      <td style="color:#94a3b8;font-size:.72rem">${i.category}</td>
      <td>${i.tier}${i.tier !== i.requestedTier ? ' <span class="warn">(fallback)</span>' : ''}</td>
      <td style="text-align:right">${i.qty}</td>
      <td style="text-align:right">$${i.unitCost.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="text-align:right;font-weight:600">$${Math.round(i.lineTotal).toLocaleString()}</td>
    </tr>`;
  });
  html += '</tbody></table>';
});

resultsDiv.innerHTML = html;

// ==================== EXPORT RESULTS FOR MD REPORT ====================
window.QA_RESULTS = { checks, passCount, failCount, warnCount, presetTotals, presetResults, itemCounts };
</script>
