<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Market Cost Calculator | Lucky Duck Group</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1E293B;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.header{background:#0F172A;border-bottom:1px solid #334155;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.4rem;font-weight:700;color:#fff}.brand{color:#2563EB;font-size:.85rem;font-weight:600}
.container{max-width:1000px;margin:0 auto;padding:24px 32px}
.section{background:#0F172A;border:1px solid #334155;border-radius:12px;padding:24px;margin-bottom:24px}
.section h2{font-size:1.1rem;margin-bottom:16px;color:#fff}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.control-group label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px}
.control-group select,.control-group input{width:100%;padding:10px 12px;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95rem}
.control-group select:focus,.control-group input:focus{outline:none;border-color:#2563EB}
.class-btns{display:flex;gap:8px}
.class-btn{flex:1;padding:10px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#94a3b8;cursor:pointer;text-align:center;font-weight:600;font-size:.9rem}
.class-btn.active{border-color:#2563EB;color:#2563EB;background:#1E293B}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:#0F172A;border:1px solid #334155;border-radius:12px;padding:20px;text-align:center}
.kpi-label{font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi-value{font-size:1.5rem;font-weight:700;color:#fff}
.kpi-value.blue{color:#2563EB}.kpi-value.green{color:#4ade80}.kpi-value.amber{color:#f59e0b}.kpi-value.red{color:#f87171}
.hero-number{text-align:center;padding:24px;margin-bottom:16px}
.hero-number .big{font-size:2.5rem;font-weight:800;color:#2563EB}
.hero-number .sub{font-size:.9rem;color:#94a3b8;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 12px;border-bottom:1px solid #334155;color:#94a3b8;font-weight:600}
td{padding:10px 12px;border-bottom:1px solid #334155}
.warning-box{background:#450a0a;border:2px solid #f87171;border-radius:12px;padding:20px;margin:24px 0;text-align:center}
.warning-box p{color:#fca5a5;font-size:.95rem;line-height:1.5}
.warning-box strong{color:#f87171}
.cta{background:linear-gradient(135deg,#2563EB,#1D4ED8);border-radius:12px;padding:32px;text-align:center;margin:32px 0}
.cta h3{font-size:1.3rem;color:#fff;margin-bottom:8px}
.cta p{color:#BFDBFE;margin-bottom:16px;font-size:.9rem}
.cta a{display:inline-block;background:#fff;color:#1D4ED8;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal{background:#0F172A;border:1px solid #334155;border-radius:16px;padding:40px;max-width:480px;width:90%;text-align:center}
.modal h3{color:#fff;margin-bottom:12px}
.modal input{width:100%;padding:12px;margin:8px 0;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:1rem}
.modal button{width:100%;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:8px}
.footer{text-align:center;padding:24px;color:#475569;font-size:.75rem;border-top:1px solid #334155;margin-top:32px}
@media(max-width:768px){.kpi-row{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr}}
@media print{body{background:#fff!important;color:#111!important}.header{background:#fff!important;color:#111!important}.section,.kpi-card{background:#fff!important;border-color:#ccc!important;color:#111!important}.controls,.cta,.warning-box,.modal-overlay{display:none!important}}
</style>
</head>
<body>
<div class="header">
  <h1>Local Market Cost Calculator</h1>
  <span class="brand">Lucky Duck Group</span>
</div>
<div class="container">
  <div class="section">
    <h2>Select Your Market</h2>
    <div class="controls">
      <div class="control-group">
        <label>State</label>
        <select id="stateSelect" onchange="updateMetros()"><option value="">Select state...</option></select>
      </div>
      <div class="control-group">
        <label>Metro Area</label>
        <select id="metroSelect" onchange="calculate()"><option value="">Select metro...</option></select>
      </div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Unit Count</label>
        <input type="number" id="unitInput" value="50" min="1" oninput="calculate()">
      </div>
      <div class="control-group">
        <label>Property Class</label>
        <div class="class-btns">
          <div class="class-btn" onclick="setClass('A')">A</div>
          <div class="class-btn" onclick="setClass('B')">B</div>
          <div class="class-btn active" onclick="setClass('C')">C</div>
          <div class="class-btn" onclick="setClass('D')">D</div>
        </div>
      </div>
    </div>
  </div>

  <div class="hero-number">
    <div class="big" id="heroOpex">Select a market above</div>
    <div class="sub" id="heroSub">Estimated total OpEx per unit per year</div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Cap Rate Range</div><div class="kpi-value blue" id="kpiCap">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Vacancy Rate</div><div class="kpi-value amber" id="kpiVac">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Insurance/Unit</div><div class="kpi-value" id="kpiIns">—</div></div>
    <div class="kpi-card"><div class="kpi-label">Avg Rent (1BR)</div><div class="kpi-value green" id="kpiRent">—</div></div>
  </div>

  <div class="section">
    <h2>Expense Breakdown by Category</h2>
    <table id="expTable">
      <thead><tr><th>Category</th><th>$/Unit/Year</th><th>% of Total</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="chartBox" class="section" style="display:none">
    <div id="expChart" style="height:380px"></div>
  </div>

  <div class="warning-box" id="warningBox" style="display:none">
    <p><strong>Red Flag Alert:</strong> If your broker's OM shows total expenses below <strong id="warningFloor">$0</strong>/unit — that's a red flag. Get the Broker NOI Checker to find out where they're hiding costs.</p>
  </div>

  <div style="text-align:center;margin:24px 0">
    <button class="class-btn" style="border-color:#2563EB;color:#2563EB;padding:14px 28px;font-size:1rem;cursor:pointer" onclick="showModal()">Save My Market Report</button>
  </div>

  <div class="cta">
    <h3>Ready to check a real deal?</h3>
    <p>The Broker NOI Checker compares broker assumptions against institutional underwriting standards with 15 expense categories, 12 automated red flags, and valuation projections.</p>
    <a href="https://davenova3.gumroad.com/l/noi-checker">Get the Broker NOI Checker ($29) &rarr;</a>
  </div>
</div>

<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <h3>Save Your Market Report</h3>
    <p style="color:#94a3b8;font-size:.9rem;margin-bottom:16px">Enter your email to save this report and get quarterly updates when market data changes.</p>
    <input type="email" id="emailInput" placeholder="you@email.com">
    <button onclick="captureEmail()">Save & Get Updates</button>
    <p style="color:#64748b;font-size:.75rem;margin-top:8px;cursor:pointer" onclick="hideModal()">No thanks</p>
  </div>
</div>

<div class="footer">
  Data: 2026-Q1 | Sources: CBRE, CoStar, Zillow ZORI, BLS | &copy; 2026 Lucky Duck Group
</div>

// Populate states
const stSel = document.getElementById('stateSelect');
Object.entries(MDATA.states).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([code, st]) => {
  const o = document.createElement('option');
  o.value = code; o.textContent = st.name;
  stSel.appendChild(o);
});

function updateMetros(){
  const st = stSel.value;
  const mSel = document.getElementById('metroSelect');
  mSel.innerHTML = '<option value="">Select metro...</option>';
  if(!st || !MDATA.states[st]) return;
  Object.entries(MDATA.states[st].metros).forEach(([key, m]) => {
    const o = document.createElement('option');
    o.value = key; o.textContent = m.name;
    mSel.appendChild(o);
  });
}

function setClass(c){
  selectedClass = c;
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  calculate();
}

  const st = stSel.value;
  const mk = document.getElementById('metroSelect').value;
  if(!st || !mk || !MDATA.states[st] || !MDATA.states[st].metros[mk]) return;

  const m = MDATA.states[st].metros[mk];
  const units = +document.getElementById('unitInput').value || 50;
  const mult = CLASS_MULT[selectedClass];
  const exp = m.expenses_per_unit;

  // Adjust expenses by class
  const cats = [
    ['Management Fee', exp.management ? exp.management/100 * m.avg_rent_1br * 12 : 0, '%'],
    ['Insurance', exp.insurance * mult, '$'],
    ['Repairs & Maintenance', exp.rm * mult, '$'],
    ['Turnover/Make-Ready', exp.turnover * mult, '$'],
    ['Utilities', exp.utilities * mult, '$'],
    ['Payroll (100+ units)', units >= 50 ? exp.payroll_100plus * mult : 0, '$'],
    ['Admin/G&A', exp.admin, '$'],
    ['Marketing/Leasing', exp.marketing * mult, '$'],
    ['Landscaping', exp.landscaping * mult, '$'],
    ['Pest Control', exp.pest * mult, '$'],
    ['Trash Removal', exp.trash, '$'],
    ['Reserves', exp.reserves * mult, '$'],
  ];

  const total = cats.reduce((s, c) => s + c[1], 0);

  document.getElementById('heroOpex').textContent = fmt(total) + '/unit/year';
  document.getElementById('heroSub').textContent = m.name + ' — Class ' + selectedClass + ' — ' + units + ' units';
  document.getElementById('kpiCap').textContent = m.cap_rate.low.toFixed(1) + '-' + m.cap_rate.high.toFixed(1) + '%';
  document.getElementById('kpiVac').textContent = m.vacancy_rate.toFixed(1) + '%';
  document.getElementById('kpiIns').textContent = fmt(m.insurance_per_unit);
  document.getElementById('kpiRent').textContent = fmt(m.avg_rent_1br);

  // Table
  let html = '';
  cats.forEach(c => {
    const pct = total > 0 ? (c[1]/total*100).toFixed(1) : '0';
    html += '<tr><td>' + c[0] + '</td><td>' + fmt(c[1]) + '</td><td>' + pct + '%</td></tr>';
  });
  html += '<tr style="font-weight:700;border-top:2px solid #334155"><td>Total OpEx/Unit</td><td>' + fmt(total) + '</td><td>100%</td></tr>';
  document.querySelector('#expTable tbody').innerHTML = html;

  // Chart
  document.getElementById('chartBox').style.display = 'block';
  Plotly.react('expChart', [{
    x: cats.map(c=>c[0]), y: cats.map(c=>c[1]), type: 'bar',
    marker: {color: '#2563EB'},
    text: cats.map(c=>fmt(c[1])), textposition: 'outside', textfont: {color: '#e2e8f0', size: 10},
  }], {
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: {color: '#94a3b8'}, yaxis: {gridcolor: '#334155', tickformat: '$,.0f'},
    xaxis: {gridcolor: '#334155', tickangle: -35}, margin: {t:20, b:100, l:60, r:20},
  }, {displayModeBar: false, responsive: true});

  // Warning
  const floor = Math.round(total * 0.75);
  document.getElementById('warningFloor').textContent = fmt(floor);
  document.getElementById('warningBox').style.display = 'block';
}

function showModal(){document.getElementById('emailModal').style.display='flex';}
function hideModal(){document.getElementById('emailModal').style.display='none';}
async function captureEmail(){
  const email = document.getElementById('emailInput').value;
  if(!email || !email.includes('@')){alert('Please enter a valid email.');return;}
  try{
    const formBody='email='+encodeURIComponent(email)+'&userGroup=market-calculator';
    const res=await fetch('https://app.loops.so/api/newsletter-form/cmnd7zpbc004n0hzky2vvtxc6',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:formBody
    });
    hideModal();
    alert('Report saved! You will receive quarterly market data updates at ' + email);
  }catch(err){alert('Something went wrong. Please try again.');}
}
